name: Capstone Prod pipeline

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:
    types: [opened, closed]
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Lint Code
        run: |
          flake8 app.py test_app.py

      - name: Run Tests
        run: |
          pytest test_app.py -v
